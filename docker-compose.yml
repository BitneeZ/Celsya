version: '3.9'

services:
  roadmap_generator:
    # Собирать образ из Dockerfile в текущей папке
    build: .
    container_name: roadmap_generator_app
    restart: unless-stopped
    ports:
      # Пробрасываем порт 8080 из контейнера на порт 8080 вашего ноутбука
      - "8080:8080"
    # Для GGUF моделей, которые сильно нагружают CPU,
    # можно увеличить разделяемую память (опционально, но рекомендуется)
    shm_size: '4gb'
    # Вот и магия:
    volumes:
      # Мы "пробрасываем" текущую директорию (.) с вашего компьютера
      # в директорию /app внутри контейнера.
      - .:/app